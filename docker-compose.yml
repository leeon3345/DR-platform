services:
  dr-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - .env.api
    volumes:
      - ./server/registry:/app/server/registry

  dr-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_API_URL: ${VITE_API_URL:-}
    depends_on:
      - dr-api
    ports:
      - "5173:80"
