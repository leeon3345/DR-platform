apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dr-agent.fullname" . }}-auth
  labels:
    app.kubernetes.io/name: {{ include "dr-agent.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  CLUSTER_TOKEN: {{ required "agent.token is required and must be supplied with --set agent.token=..." .Values.agent.token | quote }}
